<svg xmlns="http://www.w3.org/2000/svg" width="820" height="770" viewBox="0 0 820 770" font-family="'PingFang TC','Heiti TC','Noto Sans CJK TC',sans-serif">
  <rect width="820" height="770" fill="#FAF9F6"/>
  <text x="380" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#1B2A24">ADAF 分層架構 · CPS-01~07</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1B2A24"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>

  <!-- CPS-06 外框 -->
  <rect x="40" y="80" width="440" height="540" fill="none" stroke="#004D40" stroke-width="1.2" stroke-dasharray="8 8"/>
  <text x="52" y="100" font-size="12" font-weight="700" fill="#004D40">CPS-06 Layered + Naming Convention</text>

  <!-- 主分層箭頭 -->
  <g stroke="#004D40" stroke-width="2" marker-end="url(#a)">
    <line x1="260" y1="170" x2="260" y2="208"/>
    <line x1="260" y1="270" x2="260" y2="308"/>
    <line x1="260" y1="370" x2="260" y2="408"/>
    <line x1="260" y1="470" x2="260" y2="508"/>
    <line x1="260" y1="570" x2="260" y2="638"/>
  </g>
  <!-- 橫切虛線 -->
  <g stroke="#666" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#ag)">
    <line x1="540" y1="140" x2="442" y2="140"/>
    <line x1="540" y1="340" x2="442" y2="340"/>
    <line x1="540" y1="440" x2="442" y2="440"/>
  </g>

  <!-- 分層節點 -->
  <g>
    <rect x="80" y="110" width="360" height="60" rx="8" fill="#E0F2F1" stroke="#004D40" stroke-width="1.5"/>
    <text x="260" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#004D40">Controller / WebSocketService</text>
    <text x="260" y="155" text-anchor="middle" font-size="10" fill="#004D40">@WebServlet (Stateless) / @ServerEndpoint (Stateful)</text>
  </g>
  <g>
    <rect x="80" y="210" width="360" height="60" rx="8" fill="#E0F2F1" stroke="#004D40" stroke-width="1.5"/>
    <text x="260" y="235" text-anchor="middle" font-size="13" font-weight="700" fill="#004D40">BO (Business Object)</text>
    <text x="260" y="255" text-anchor="middle" font-size="10" fill="#004D40">Private Constructor + Static Methods (Stateless)</text>
  </g>
  <g>
    <rect x="80" y="310" width="360" height="60" rx="8" fill="#E0F2F1" stroke="#004D40" stroke-width="1.5"/>
    <text x="260" y="335" text-anchor="middle" font-size="13" font-weight="700" fill="#004D40">Cache (Memory State Holder)</text>
    <text x="260" y="355" text-anchor="middle" font-size="10" fill="#004D40">extends AbstractCache (Stateful)</text>
  </g>
  <g>
    <rect x="80" y="410" width="360" height="60" rx="8" fill="#E0F2F1" stroke="#004D40" stroke-width="1.5"/>
    <text x="260" y="435" text-anchor="middle" font-size="13" font-weight="700" fill="#004D40">DAO (Data Access Object)</text>
    <text x="260" y="455" text-anchor="middle" font-size="10" fill="#004D40">SQL + Row Mapping (Stateless)</text>
  </g>
  <g>
    <rect x="80" y="510" width="360" height="60" rx="8" fill="#E0F2F1" stroke="#004D40" stroke-width="1.5"/>
    <text x="260" y="535" text-anchor="middle" font-size="13" font-weight="700" fill="#004D40">DTO / Entity</text>
    <text x="260" y="555" text-anchor="middle" font-size="10" fill="#004D40">Data Objects / Domain Objects</text>
  </g>
  <!-- DB 圓柱 -->
  <g>
    <path d="M160,652 a100,12 0 0,0 200,0 l0,56 a100,12 0 0,1 -200,0 Z" fill="#004D40" stroke="#004D40"/>
    <ellipse cx="260" cy="652" rx="100" ry="12" fill="#0a5f51" stroke="#004D40"/>
    <text x="260" y="690" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">DB</text>
    <text x="260" y="708" text-anchor="middle" font-size="10" fill="#CFE3DD">PostgreSQL (Main) + MySQL (Secondary)</text>
  </g>

  <!-- 橫切元件 -->
  <g>
    <rect x="540" y="110" width="180" height="60" rx="2" fill="#F5F5F5" stroke="#666" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="630" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Manager</text>
    <text x="630" y="153" text-anchor="middle" font-size="10" fill="#666">*/provider, Singleton 熱切換</text>
  </g>
  <g>
    <rect x="540" y="310" width="180" height="60" rx="2" fill="#F5F5F5" stroke="#666" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="630" y="335" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Type Enum</text>
    <text x="630" y="353" text-anchor="middle" font-size="10" fill="#666">commons/code, 策略 enum</text>
  </g>
  <g>
    <rect x="540" y="410" width="180" height="60" rx="2" fill="#F5F5F5" stroke="#666" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="630" y="432" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Utils（方言隔離）</text>
    <text x="630" y="450" text-anchor="middle" font-size="9" fill="#666">DbUtils / MySqlUtils / PostgreSqlUtils</text>
  </g>

  <!-- CPS 標籤 -->
  <g font-size="11" font-weight="700" fill="#000">
    <g><rect x="445" y="125" width="58" height="26" rx="2" fill="#FFF9C4" stroke="#FBC02D"/><text x="474" y="142" text-anchor="middle">CPS-05</text></g>
    <g><rect x="445" y="325" width="58" height="26" rx="2" fill="#FFF9C4" stroke="#FBC02D"/><text x="474" y="342" text-anchor="middle">CPS-03</text></g>
    <g><rect x="445" y="425" width="58" height="26" rx="2" fill="#FFF9C4" stroke="#FBC02D"/><text x="474" y="442" text-anchor="middle">CPS-07</text></g>
    <g><rect x="445" y="525" width="58" height="26" rx="2" fill="#FFF9C4" stroke="#FBC02D"/><text x="474" y="542" text-anchor="middle">CPS-04</text></g>
    <g><rect x="725" y="125" width="58" height="26" rx="2" fill="#FFF9C4" stroke="#FBC02D"/><text x="754" y="142" text-anchor="middle">CPS-01</text></g>
    <g><rect x="725" y="325" width="58" height="26" rx="2" fill="#FFF9C4" stroke="#FBC02D"/><text x="754" y="342" text-anchor="middle">CPS-02</text></g>
    <g><rect x="725" y="425" width="58" height="26" rx="2" fill="#FFF9C4" stroke="#FBC02D"/><text x="754" y="442" text-anchor="middle">CPS-07</text></g>
  </g>
</svg>
